# Static Pod Manifest for Vault KMS Plugin
#
# This manifest is a TEMPLATE and should not be deployed directly.
# Use the deploy-kms-st-pod.sh script with --local flag to deploy.
#
# Static pods are managed directly by the kubelet on each control plane node.
# The manifest should be placed in /etc/kubernetes/manifests/ on each node.
#
# Key differences from DaemonSet:
# - No selector or template wrapper
# - Credentials embedded directly as environment variables (no Secrets)
# - Managed per-node by kubelet, not by a controller
# - Named with node suffix in the cluster (e.g., vault-kube-kms-master-0)
#
apiVersion: v1
kind: Pod
metadata:
  name: vault-kube-kms
  namespace: openshift-kms-plugin
  labels:
    app: vault-kube-kms
    tier: control-plane
spec:
  # Note: hostNetwork is NOT needed - KMS plugin communicates via Unix socket
  # mounted as hostPath, not over the network
  priorityClassName: system-node-critical
  # Static pods don't use serviceAccountName - they run with kubelet's permissions
  containers:
  - name: vault-kube-kms
    # Use private image from Quay.io
    image: quay.io/rhn_support_rgangwar/vault-kube-kms:latest
    imagePullPolicy: Always
    command:
    - /bin/sh
    - -c
    args:
    - |
      echo "$VAULT_SECRET_ID" > /tmp/secret-id
      exec /vault-kube-kms \
        -listen-address=unix:///var/run/kmsplugin/kms.sock \
        -vault-address=$VAULT_ADDR \
        -vault-namespace=$VAULT_NAMESPACE \
        -transit-mount=transit \
        -transit-key=$VAULT_KEY_NAME \
        -log-level=debug-extended \
        -approle-role-id=$VAULT_ROLE_ID \
        -approle-secret-id-path=/tmp/secret-id
    env:
    # These placeholders will be replaced by the deployment script
    - name: VAULT_ROLE_ID
      value: "PLACEHOLDER_ROLE_ID"
    - name: VAULT_SECRET_ID
      value: "PLACEHOLDER_SECRET_ID"
    - name: VAULT_ADDR
      value: "PLACEHOLDER_VAULT_ADDR"
    - name: VAULT_NAMESPACE
      value: "PLACEHOLDER_VAULT_NAMESPACE"
    - name: VAULT_KEY_NAME
      value: "kms-key"
    volumeMounts:
    - name: kmsplugin
      mountPath: /var/run/kmsplugin
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
    securityContext:
      privileged: true
  volumes:
  - name: kmsplugin
    hostPath:
      path: /var/run/kmsplugin
      type: DirectoryOrCreate
